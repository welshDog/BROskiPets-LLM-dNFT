services:
  # Core pet agent API
  bropets-api:
    build: .
    container_name: bropets_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-bropets_secret}
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=qwen2.5:7b
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - bropets_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Security: read-only filesystem, no extra capabilities
    read_only: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    volumes:
      - ./eeps:/app/eeps:ro
      - ./metadata:/app/metadata

  # Redis memory store for pet states
  redis:
    image: redis:7-alpine
    container_name: bropets_redis
    ports:
      - "6379:6379"
    networks:
      - bropets_net
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-bropets_secret}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bropets_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Local LLM (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: bropets_ollama
    networks:
      - bropets_net
    volumes:
      - ollama_models:/root/.ollama
    command: serve
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # No internet access for agents (security)
    # To enable: remove network isolation below

volumes:
  redis_data:
  ollama_models:

networks:
  bropets_net:
    driver: bridge
    # Internal only — agents can't reach the internet
    internal: false  # Set to true for full isolation
