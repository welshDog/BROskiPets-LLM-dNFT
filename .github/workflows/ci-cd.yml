name: BROskiPets CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11" ]

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8 (optional)
      run: |
        pip install flake8
        # Stop build on syntax errors, ignore line length for now
        flake8 agent.py metadata.py api/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Run pytest
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: ""
        LLM_BASE_URL: http://localhost:11434
        LLM_MODEL: qwen2.5:7b
      run: |
        python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing 2>&1 | head -200

    - name: Test import chain
      run: |
        python -c "from api.main import app; print('✅ API imports successfully')"
        python -c "from agent import BROskiPet; print('✅ Agent imports successfully')"
        python -c "from metadata import EEPMetadata; print('✅ Metadata imports successfully')"

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: broskipets-llm-dnft-bropets-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker build
      run: |
        docker build -t broskipets-test:latest .
        docker run --rm broskipets-test:latest python -c "from api.main import app; print('✅ Docker image built and tested successfully')"

  solidity-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly

    - name: Run Foundry tests
      run: |
        cd contracts
        forge test -v --summary 2>&1 | tail -50

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run basic security checks
      run: |
        python -m pip install bandit
        bandit -r agent.py metadata.py api/ -ll || true
